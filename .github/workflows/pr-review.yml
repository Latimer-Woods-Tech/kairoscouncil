name: Canonical PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

# Cancel in-progress review when a new push lands on the same PR
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  review:
    name: Factory architecture review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip draft PRs — re-triggers automatically when marked ready
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.FACTORY_APP_ID }}
          private-key: ${{ secrets.FACTORY_APP_PRIVATE_KEY }}
          owner: Latimer-Woods-Tech

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Fetch canonical reviewer from Factory
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/Latimer-Woods-Tech/factory/contents/.github/scripts/pr-review.mjs \
            --jq '.content' | base64 -d > pr-review.mjs

      - name: Run canonical review
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-20250514
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: node pr-review.mjs
