name = "kairos-council-api"
main = "src/index.ts"
compatibility_date = "2024-04-01"
node_compat = true

# Staging environment
[env.staging]
name = "kairos-council-api-staging"
vars = { ENVIRONMENT = "staging" }

# Production environment
[env.production]
name = "kairos-council-api-production"
vars = { ENVIRONMENT = "production" }

# Durable Objects — match state management
[[durable_objects.bindings]]
name = "MATCH_DO"
class_name = "MatchDurableObject"

[[migrations]]
tag = "v1"
new_classes = ["MatchDurableObject"]

# KV — transit cache
[[kv_namespaces]]
binding = "TRANSIT_CACHE"
id = ""
preview_id = ""

# Secrets configured via `wrangler secret put`:
# NEON_DATABASE_URL
# JWT_SECRET
# ENCRYPTION_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
